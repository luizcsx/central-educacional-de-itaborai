<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro Educacional de Itaboraí - Entrar na Plataforma</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --cei-blue: #004aad;
            --cei-gold: #ffbd59;
            --cei-white: #ffffff;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo-placeholder { font-weight: 800; color: var(--cei-blue); font-size: 24px; margin-bottom: 1rem; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: var(--cei-blue);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }
        button:hover { background: #003a8c; }
        .error-msg { color: #d9534f; font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo-placeholder">C.E.I.</div>
    <h2>Acesse sua conta</h2>
    
    <form id="loginForm">
        <input type="text" id="username" placeholder="Seu nome de usuário ou e-mail" required>
        <input type="password" id="password" placeholder="Sua senha" required>
        
        <button type="submit" id="btnEntrar">
            <i class="fa-solid fa-right-to-bracket"></i> Entrar
        </button>
    </form>
    
    <div id="errorMessage" class="error-msg">Usuário ou senha incorretos.</div>
    
    <p style="margin-top: 1.5rem; font-size: 14px;">
        Ainda não tem conta? <a href="cadastro.html" style="color: var(--cei-blue);">Cadastre-se</a>
    </p>
</div>

<script src="login-script.js"></script>

</body>
</html>
